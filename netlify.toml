[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["formidable", "nodemailer"]
  included_files = ["netlify/functions/*.cjs"]
  
  [functions.sendmail]
    timeout = 60  # 60 secondes

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[dev]
  framework = "vite"
  target = "."
  command = "npm run dev"
  port = 5174  # Changement de port pour éviter le conflit avec Vite
  publish = "dist"
  functions = "netlify/functions"
  
  [dev.proxy]
    # Configuration du proxy pour rediriger les requêtes API vers le port de Vite
    "/api/*" = { from = "/api/*", to = "http://localhost:5173/api/:splat" }

# Redirection pour l'API (au cas où)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
